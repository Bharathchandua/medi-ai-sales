spring.application.name=medi-ai-sales
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medi_ai_sales}
spring.datasource.username=${DB_USERNAME:medi_user}
spring.datasource.password=${DB_PASSWORD:medi1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=tinyllama

# --- SMTP Email Configuration ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Replace with your actual email address
spring.mail.username=your_email@gmail.com
# Replace with your Gmail App Password (not your normal password!)
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true